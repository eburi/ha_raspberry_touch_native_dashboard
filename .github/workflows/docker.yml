name: Build and Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy source into app directory
        run: |
          cp build.zig build.zig.zon lv_conf.h ha_raspberry_touch_native_dashboard/
          cp -r src ha_raspberry_touch_native_dashboard/src
          cp -r web ha_raspberry_touch_native_dashboard/web

      - name: Build and push
        uses: home-assistant/builder@2026.02.1
        with:
          args: |
            --aarch64 \
            --target ha_raspberry_touch_native_dashboard
