name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  zig-tests:
    name: Run Zig tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Check formatting
        run: zig fmt --check src/ tests/ build.zig

      - name: Run tests
        run: zig build test -Doptimize=ReleaseSafe
