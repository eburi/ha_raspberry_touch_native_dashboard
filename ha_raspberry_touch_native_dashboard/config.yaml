# Home Assistant App configuration
# https://developers.home-assistant.io/docs/apps
name: "Raspberry Pi Touchscreen native Dashboard for HAOS"
version: "0.4.0"
slug: ha_raspberry_touch_native_dashboard
description: >-
  Touch-screen dashboard built with LVGL graphics library, compiled to WASM
  and rendered in the browser via HTML5 Canvas. Designed for a 1280x720
  nautical dashboard with sail configuration controls.
url: "https://github.com/eburi/ha_raspberry_touch_native_dashboard"
arch:
  - aarch64
image: ghcr.io/eburi/ha_raspberry_touch_native_dashboard/{arch}
init: false
startup: application

# Resource access
homeassistant_api: true
hassio_api: true
hassio_role: default

# Device access for native framebuffer + touch input rendering
devices:
  - /dev/fb0
  - /dev/input/event0

# Ingress (web UI served through HA proxy)
ingress: true
ingress_port: 8765
panel_icon: "mdi:view-dashboard"
panel_title: "Raspberry Pi Touchscreen native Dashboard for HAOS"

# User-configurable options (available via bashio::config)
options:
  port: 8765
  log_level: info
  signalk_url: ""
schema:
  port: "int(1,65535)"
  log_level: "list(error|warning|info|debug)"
  signalk_url: "str"

# Startup behavior
boot: auto

# Map persistent storage
map:
  - config:rw
